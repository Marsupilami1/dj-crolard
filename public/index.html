<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<title>DJ Crolard</title>
		<link rel="stylesheet" href="style.css" />
		<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
		<script src="https://www.youtube.com/iframe_api"></script>
		<script src="client.js"></script>
		<link rel="icon" type="image/png" href="favicon.ico" />
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
		/>
	</head>
	<body
		class="bg-mist-800 text-zinc-200 font-display w-full flex flex-col items-center mt-20"
	>
		<div class="flex gap-6">
			<div class="flex flex-col w-5xl gap-2">
				<div class="flex flex-col gap-4 items-center">
					<div class="flex w-full justify-between items-center">
						<div>
							<h2 class="text-6xl font-bold">DJ Crolard</h2>
							<h3 class="text-3xl">A Collaborative Jukebox Experience</h3>
						</div>

						<button
							id="btn-sync"
							onclick="forceSync()"
							class="w-sm h-full p-2 text-white bg-green-700 ease-in-out duration-600 rounded-sm text-2xl hover:cursor-pointer group"
						>
							Join Jukebox
							<div class="group-hover:animate-spin ease-in-out duration-600">
								<i class="bi bi-arrow-clockwise text-4xl"></i>
							</div>
						</button>
					</div>

					<div class="relative flex gap-2 w-full" id="search-wrap">
						<input
							type="text"
							id="search-bar"
							placeholder="Add your song here ! (youtube link)"
							class="bg-mist-900"
						/>
						<button
							onclick="search()"
							class="p-2 text-white bg-red-700 hover:bg-green-700 ease-in-out duration-600 rounded-sm hover:cursor-pointer text-xl group"
						>
							<div
								class="group-hover:-rotate-180 group-hover:scale-120 ease-in-out duration-600"
							>
								<i class="bi bi-plus text-4xl"></i>
							</div>
						</button>

						<div class="dropdown" id="dropdown">
							<div class="min-h-0 max-h-[625px] overflow-y-scroll">
								<div
									class="flex flex-col p-2 justify-between bg-mist-900 border-2 border-zinc-200 rounded-lg"
									id="search-results"
								></div>
							</div>
						</div>
					</div>

					<div id="player-wrapper" class="border-zinc-500 border-2">
						<div id="player"></div>
					</div>
				</div>
			</div>

			<div
				class="flex flex-col w-lg items-center bg-mist-900 rounded-sm border-zinc-500 border-2 h-[760px] overflow-y-scroll"
			>
				<div class="flex flex-col sticky top-0 bg-mist-900 p-4 w-full">
					<div class="flex justify-between">
						<button
							onclick="askClearQueue()"
							class="p-2 w-[120px] text-white bg-red-900 hover:bg-red-700 ease-in-out duration-600 rounded-sm hover:cursor-pointer text-xl group"
						>
							Clear
						</button>
						<button
							onclick="askNextVideo()"
							class="p-2 w-[120px] text-white bg-blue-900 hover:bg-blue-700 ease-in-out duration-600 rounded-sm hover:cursor-pointer text-xl group"
						>
							<i class="bi bi-fast-forward-fill text-2xl"></i>
						</button>
						<button
							onclick="askPause()"
							class="p-2 w-[120px] text-white bg-blue-900 hover:bg-blue-700 ease-in-out duration-600 rounded-sm hover:cursor-pointer text-xl group"
							id="play-button"
						>
							<i class="bi bi-pause text-2xl"></i>
						</button>
					</div>
				</div>

				<div class="w-full">
					<ul id="playlist-view"></ul>
				</div>
			</div>
		</div>
	</body>

	<div
		class="absolute bottom-0 inset-x-0 flex justify-center gap-10"
		id="viewers"
	></div>
</html>
